<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password | Personal Finance Dashboard</title>

  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>

<body class="auth-body">

  <div class="auth-wrapper">

    <!-- LEFT SIDE — FORM -->
    <div class="auth-panel auth-panel--form">
      <div class="auth-form">

        <h1 class="auth-title">Forgot Password?</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

        <form id="forgotPasswordForm">

          <div class="field">
            <label for="email">Email Address</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="Enter your email address"
              required
              maxlength="50"
            />
            <small class="field-error" id="emailError" aria-live="polite"></small>
          </div>

          <button type="submit" class="btn-primary">Send Reset Link</button>

          <div class="auth-actions-row">
            <a href="login.html" class="btn-ghost">Back to Login</a>
          </div>

          <p id="forgotMessage" class="auth-message" aria-live="polite"></p>

        </form>
      </div>
    </div>

    <!-- RIGHT SIDE — ILLUSTRATION -->
    <div class="auth-panel auth-panel--illustration">
      <img
        src="../assets/images/LoginHero.png"
        alt="Forgot Password Illustration"
        class="hero-illustration"
      />
    </div>

  </div>

  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>

</body>
</html>
