<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password | Personal Finance Dashboard</title>

  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>

<body class="auth-body">

  <div class="auth-wrapper">

    <!-- LEFT SIDE — FORM -->
    <div class="auth-panel auth-panel--form">
      <div class="auth-form">

        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Enter your new password below.</p>

        <form id="resetPasswordForm">

          <div class="field">
            <label for="password">New Password</label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Enter new password"
              required
              maxlength="128"
            />
            <small class="field-error" id="passwordError" aria-live="polite"></small>
          </div>

          <div class="field">
            <label for="confirmPassword">Confirm Password</label>
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              placeholder="Confirm new password"
              required
              maxlength="128"
            />
            <small class="field-error" id="confirmPasswordError" aria-live="polite"></small>
          </div>

          <button type="submit" class="btn-primary">Reset Password</button>

          <div class="auth-actions-row">
            <a href="login.html" class="btn-ghost">Back to Login</a>
          </div>

          <p id="resetMessage" class="auth-message" aria-live="polite"></p>

        </form>
      </div>
    </div>

    <!-- RIGHT SIDE — ILLUSTRATION -->
    <div class="auth-panel auth-panel--illustration">
      <img
        src="../assets/images/LoginHero.png"
        alt="Reset Password Illustration"
        class="hero-illustration"
      />
    </div>

  </div>

  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>

</body>
</html>
